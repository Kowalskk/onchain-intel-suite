server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests if we don't want to use VITE_API_URL hardcoded to localhost:8000 on the client
    # but the client-side VITE_API_URL handles it right now.
}
